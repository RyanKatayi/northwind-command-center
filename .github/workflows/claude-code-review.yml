name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request for correctness bugs, security issues,
            accessibility, and clarity. Skip style nitpicks.

            Context: Next.js 16 (App Router) + TypeScript. Operator state
            persists to localStorage; the source data in data/ is read-only.

            Leave inline comments only on real problems. Then ALWAYS post exactly
            one summary comment on the PR by running:
            gh pr comment "$PR_NUMBER" --body "<your summary>"
            Start the summary with a one-line verdict. If you found nothing
            worth changing, say so briefly.
          claude_args: |
            --max-turns 25
