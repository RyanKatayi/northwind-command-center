name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            Review this pull request for correctness bugs, security issues,
            accessibility, and clarity. Skip style nitpicks.

            Context: Next.js 16 (App Router) + TypeScript. Operator state
            persists to localStorage; the source data in data/ is read-only.

            Leave inline comments on real problems, then end with a brief
            summary that starts with a one-line verdict. If nothing needs
            changing, say so.
          claude_args: |
            --max-turns 25
