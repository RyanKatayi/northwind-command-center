name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request. Focus on correctness bugs, security
            issues, accessibility, and clarity. Leave concise inline comments on
            real problems and a short summary at the end. Skip style nitpicks.

            Context: Next.js 16 (App Router) + TypeScript. Operator state
            persists to localStorage; the source data in data/ is read-only.
          claude_args: |
            --max-turns 25
